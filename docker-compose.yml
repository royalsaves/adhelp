services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: identity-access-support-console
    ports:
      - "5001:5001"
    environment:
      APP_MODE: demo
      SERVICE_NAME: Identity Access Support Console
      SERVICE_DOMAIN: localhost:5001
      COMPANY_NAME: ExampleCorp
      COMPANY_DOMAIN: example.com
      SUPPORT_EMAIL: support@example.com
